# Extract parcel tracking numbers from incoming e-mail and register them
# with carriers that expose a `track_parcel` action (GLS, Dragonfly, …),
# so parcels appear in the aggregator the moment the shipping
# confirmation lands in your inbox — no manual entry.
#
# Requirements:
#   - one or more core IMAP config entries with "text" enabled under
#     "message data" and the max message size raised (carrier mails are
#     long) — full setup guide and pitfalls: track_parcels_from_email.md
#   - carrier integrations with a `track_parcel` action, e.g.
#     ha-gls and ha-dragonfly
#   - optional: an `ai_task` entity for the AI fallback branch; delete
#     the whole `else:` block if you don't use one
#
# The regexes are deliberately written without backslashes
# (`(?<![0-9])` instead of `\b`, `[0-9]` instead of `\d`): Jinja treats
# `\b` inside a string literal as a backspace escape, so the pattern
# would silently never match.

alias: "Parcel: track from e-mail"
description: >-
  Listens to imap_content events from all IMAP entries. Fast regex paths
  for Dragonfly (AMZNL…) and GLS (11–14 digits in GLS mails); optional
  AI fallback for other shipping mails.
mode: queued
max: 10

triggers:
  - trigger: event
    event_type: imap_content

variables:
  sender: "{{ trigger.event.data.sender | default('') | lower }}"
  subject: "{{ trigger.event.data.subject | default('') }}"
  body: "{{ trigger.event.data.text | default('') }}"
  content: "{{ subject ~ ' ' ~ body }}"
  dragonfly_codes: >-
    {{ content | regex_findall('(?<![0-9A-Za-z])AMZNL[0-9A-Za-z]{6,}') | unique | list }}
  is_gls_mail: "{{ 'gls' in sender or 'gls' in (subject | lower) }}"
  # 11–14 digit runs, only in GLS mails; drops Dutch phone numbers in
  # international notation (31 + 9 digits) — adapt to your country code.
  gls_codes: >-
    {{ (content | regex_findall('(?<![0-9])[0-9]{11,14}(?![0-9])')
        | unique | reject('match', '31[0-9]{9}$') | list) if is_gls_mail else [] }}
  # Keyword gate for the AI fallback — localise to your language(s).
  is_parcel_mail: >-
    {{ content | lower is search('pakket|bezorg|track|verzonden|onderweg|zending|shipment|delivery|levering') }}

conditions:
  # initial=true means "new message"; false means a duplicate trigger of
  # the SAME message (e.g. after a reconnect) — requiring it is free dedup.
  - condition: template
    value_template: "{{ trigger.event.data.initial | default(true) }}"
  - condition: template
    value_template: "{{ is_parcel_mail or dragonfly_codes | count > 0 or gls_codes | count > 0 }}"

actions:
  - repeat:
      for_each: "{{ dragonfly_codes }}"
      sequence:
        - action: dragonfly.track_parcel
          data:
            tracking_code: "{{ repeat.item }}"
  - repeat:
      for_each: "{{ gls_codes }}"
      sequence:
        - action: gls.track_parcel
          data:
            parcel_no: "{{ repeat.item }}"
  - if:
      - condition: template
        value_template: "{{ dragonfly_codes | count > 0 or gls_codes | count > 0 }}"
    then:
      - action: notify.mobile_app_your_phone
        data:
          title: "📦 Parcel picked up from mail"
          message: >-
            {% if dragonfly_codes | count > 0 %}Dragonfly: {{ dragonfly_codes | join(', ') }}{% endif %}
            {%- if dragonfly_codes | count > 0 and gls_codes | count > 0 %} · {% endif -%}
            {% if gls_codes | count > 0 %}GLS: {{ gls_codes | join(', ') }}{% endif %}
            (mail from {{ sender }})
    else:
      # ---- Optional AI fallback — delete this block if you have no ai_task entity ----
      - action: ai_task.generate_data
        data:
          task_name: tracking-number-extraction
          entity_id: ai_task.your_ai_task_entity
          instructions: >-
            Below is an e-mail. Determine whether it contains a parcel
            tracking number and for which carrier: 'dragonfly' (code
            starts with AMZNL), 'gls' (11–14 digits), 'other' (a tracking
            number for another carrier) or 'none'. Only return real track
            & trace numbers, never order, customer or invoice numbers.
            When in doubt: 'none'.

            Sender: {{ sender }}
            Subject: {{ subject }}
            Body:
            {{ body[:6000] }}
          structure:
            carrier:
              description: Carrier of the tracking number found
              required: true
              selector:
                select:
                  options: ["dragonfly", "gls", "other", "none"]
            tracking_number:
              description: The tracking number, or empty if none
              required: false
              selector:
                text:
        response_variable: ai_result
      - choose:
          - conditions: "{{ ai_result.data.carrier == 'dragonfly' and (ai_result.data.tracking_number | default('') | trim) != '' }}"
            sequence:
              - action: dragonfly.track_parcel
                data:
                  tracking_code: "{{ ai_result.data.tracking_number | trim }}"
              - action: notify.mobile_app_your_phone
                data:
                  title: "📦 Parcel picked up from mail (AI)"
                  message: "Dragonfly: {{ ai_result.data.tracking_number | trim }} (mail from {{ sender }})"
          - conditions: "{{ ai_result.data.carrier == 'gls' and (ai_result.data.tracking_number | default('') | trim) != '' }}"
            sequence:
              - action: gls.track_parcel
                data:
                  parcel_no: "{{ ai_result.data.tracking_number | trim }}"
              - action: notify.mobile_app_your_phone
                data:
                  title: "📦 Parcel picked up from mail (AI)"
                  message: "GLS: {{ ai_result.data.tracking_number | trim }} (mail from {{ sender }})"
          - conditions: "{{ ai_result.data.carrier == 'other' and (ai_result.data.tracking_number | default('') | trim) != '' }}"
            sequence:
              - action: notify.mobile_app_your_phone
                data:
                  title: "📦 Tracking number found – carrier not supported"
                  message: "{{ ai_result.data.tracking_number | trim }} (mail from {{ sender }}, subject: {{ subject }})"
